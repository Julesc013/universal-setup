name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m unittest discover -s tests -v
      - run: python tools/structure_policy_check.py
      - run: cmake -S . -B build/smoke
      - run: cmake --build build/smoke
      - run: ctest --test-dir build/smoke --output-on-failure
      - run: python tools/strict_check.py
