name: ci

on:
  push:
  pull_request:

jobs:
  test:
    name: native-${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-24.04
          - platform: macos
            os: macos-15-intel
          - platform: windows
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Bind macOS fixtures to the real no-link temporary root
        if: runner.os == 'macOS'
        shell: bash
        run: echo "TMPDIR=$(python -c 'import os,tempfile; print(os.path.realpath(tempfile.gettempdir()))')" >> "$GITHUB_ENV"
      - run: python -m unittest discover -s tests -v
      - run: python tools/structure_policy_check.py
      - run: python tools/adversarial_coverage_check.py
      - run: cmake -S . -B build/smoke -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build/smoke --config Release --parallel
      - run: ctest --test-dir build/smoke -C Release --output-on-failure
      - run: python tools/strict_check.py

  sanitizer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: >-
          cmake -S . -B build/sanitizer
          -DUSK_BUILD_APPS=OFF
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS=-fsanitize=address,undefined
          -DCMAKE_CXX_FLAGS=-fsanitize=address,undefined
          -DCMAKE_EXE_LINKER_FLAGS=-fsanitize=address,undefined
          -DCMAKE_SHARED_LINKER_FLAGS=-fsanitize=address,undefined
      - run: cmake --build build/sanitizer --parallel
      - run: ctest --test-dir build/sanitizer --output-on-failure
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: >-
          cmake -S . -B build/fuzz
          -DUSK_BUILD_APPS=OFF
          -DUSK_BUILD_TESTS=OFF
          -DUSK_BUILD_FUZZERS=ON
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
      - run: cmake --build build/fuzz --target usk_json_fuzz --parallel
      - run: build/fuzz/usk_json_fuzz -runs=1000 -max_len=4096
